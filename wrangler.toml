name = "daya-crm-worker"
main = "src/index.js"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

[[kv_namespaces]]
binding = "DAYA_KV"
id = "7d313eeaaa5d4a50b3f779f9e0c7f180"

[browser]
binding = "MYBROWSER"

[[durable_objects.bindings]]
name = "NOTIFICATION_GATE"
class_name = "NotificationGate"

[[migrations]]
tag = "v1"
new_classes = ["NotificationGate"]

[triggers]
crons = ["0 */12 * * *", "0 */6 * * *", "* * * * *"]
